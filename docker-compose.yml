version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: remnawave-db
    restart: always
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    container_name: remnawave-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env
    volumes:
      - redis-data:/data
    expose:
      - "6379"

  remnawave:
    image: remnawave/backend:2.6.4
    container_name: remnawave
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./configs:/var/lib/remnawave/configs
    expose:
      - "3000"

  caddy:
    image: caddy:2.11
    container_name: caddy
    restart: always
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
      - "${PANEL_PORT}:${PANEL_PORT}"
    volumes:
      - ./configs/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - remnawave

volumes:
  postgres-data:
  redis-data:
  caddy-data:
    name: caddy-data
  caddy-config:
    name: caddy-config